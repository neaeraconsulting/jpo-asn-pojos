# Publish a snapshot that follows all PRs or pushes to the 'develop' branch
name: Publish JARs to the Maven Central Repository (Snapshots)
on:
  push:
    branches:
      - develop
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Maven Central Repository
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_SIGNING_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - id: get-version
        uses: jactions/maven-version@v1

      # Append "-SNAPSHOT" to version if not already present
      - name: Ensure Snapshot Version
        run: mvn versions:set -DnewVersion=${{ format('{0}-{1}', steps.get-version.outputs.version, 'SNAPSHOT') }}
        if: ${{ !endsWith(steps.get-version.outputs.version, '-SNAPSHOT' ) }}

      - name: Publish package
        run: mvn -P release --batch-mode central-publishing:publish
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_SIGNING_KEY_PASSWORD }}